<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO optimisation -->
  <meta name="description" content="BlocPlay Studios | Discover BlocPlay">
  <meta name="image" content="https://blocplaystudios.github.io/png/png.png">

  <meta property="og:type" content="website">
  <meta property="og:url" content="https://blocplaystudios.github.io/">
  <meta property="og:title" content="BlocPlay Studios">
  <meta property="og:description" content="BlocPlay Studios | Discover BlocPlay">
  <meta property="og:image" content="https://blocplaystudios.github.io/png/png.png">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:url" content="https://blocplaystudios.github.io/">
  <meta name="twitter:title" content="BlocPlay Studios">
  <meta name="twitter:description" content="BlocPlay Studios | Discover BlocPlay">
  <meta name="twitter:image" content="https://blocplaystudios.github.io/png/png.png">
  <!-- start process -->
  <title>BlocPlay Studios</title>
  
  <link rel="canonical" href="https://blocplaystudios.github.io/en/">
  
  <script>
    (function() {
      const userLang = (navigator.language || navigator.userLanguage).toLowerCase().slice(0, 2);
      const supportedLanguages = ['fr'];

      if (supportedLanguages.includes(userLang)) {
        window.location.replace('/' + userLang + '/');
      } else {

        window.location.replace('/en/');
      }
    })();
  </script>
</head>
<body>
  <noscript>
    <p>Please select your language / Veuillez choisir votre langue :</p>
    <ul>
      <li><a href="en/">English</a></li>
      <li><a href="fr/">Français</a></li>
    </ul>
  </noscript>
</body>
</html>
